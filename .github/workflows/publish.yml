name: publish

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish to PyPI (workflow_dispatch only)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: linux-dist
            cli-path: analyzerl_boxcars/target/release/analyzerl_boxcars
          - os: windows-latest
            artifact-name: windows-dist
            cli-path: analyzerl_boxcars/target/release/analyzerl_boxcars.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Build bundled parser binary
        if: runner.os == 'Windows'
        run: cargo build --release --manifest-path analyzerl_boxcars/Cargo.toml

      - name: Verify bundled parser binary
        if: runner.os == 'Windows'
        shell: bash
        run: test -f "${{ matrix.cli-path }}"

      - name: Build Windows wheel
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin twine
          if (Test-Path dist) { Remove-Item -LiteralPath dist -Recurse -Force }
          maturin build --release --out dist
          twine check dist/*

      - name: Build Linux manylinux wheel
        if: runner.os == 'Linux'
        run: |
          rm -rf dist analyzerl_boxcars/target
          docker run --rm -v "$PWD:/io" -w /io quay.io/pypa/manylinux_2_28_x86_64 /bin/bash -lc "\
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal && \
            source ~/.cargo/env && \
            /opt/python/cp310-cp310/bin/python -m pip install maturin twine && \
            cargo build --release --manifest-path analyzerl_boxcars/Cargo.toml && \
            /opt/python/cp310-cp310/bin/python -m maturin build --release --out dist --interpreter /opt/python/cp310-cp310/bin/python && \
            /opt/python/cp310-cp310/bin/python -m twine check dist/*.whl"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/*

  sdist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build --sdist
          twine check dist/*

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  pypi:
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_pypi == true)

    steps:
      - name: Verify PyPI token secret
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret: PYPI_API_TOKEN"
            exit 1
          fi
          case "$PYPI_API_TOKEN" in
            pypi-*) ;;
            *)
              echo "::error::PYPI_API_TOKEN must be the full PyPI API token beginning with pypi-"
              exit 1
              ;;
          esac

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: "*dist"
          path: dist
          merge-multiple: true

      - name: Check downloaded distributions
        run: |
          ls -la dist
          python -m pip install --upgrade twine
          twine check dist/*.whl dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist

  docs-build:
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Generate API docs
        run: |
          rm -rf docs/source/api
          python -m sphinx.ext.apidoc -f -o docs/source/api analyzerl_parser

      - name: Build Sphinx HTML
        run: sphinx-build -b html docs/source docs/build/html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  docs-deploy:
    needs: docs-build
    if: always() && needs.docs-build.result == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
